<!doctype html>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link
      rel="preload"
      href="./fonts/Roboto/static/Roboto-Regular.ttf"
      as="font"
      type="font/ttf"
    />
    <link
      rel="preload"
      href="./fonts/Roboto/static/Roboto-Bold.ttf"
      as="font"
      type="font/ttf"
    />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <div role="status" class="success__message">
        <div class="success__card__contents">
          <figure>
            <img
              src="./assets/images/icon-list.svg"
              alt="List icon"
              class="success__icon"
            />
          </figure>
          <h1 class="success__message__title">Thanks for subscribing!</h1>
          <p class="success__message__paragraph">
            A confirmation email has been sent to <strong>ash@loremcompany.com.</strong> Please
            open it and click the button inside to confirm your subscription.
          </p>
          <button type="submit" class="form__submit">Dismiss message</button>
        </div>
      </div>
    </main>
  </body>
</html>
